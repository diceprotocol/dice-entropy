# Prometheus configuration for Dice Protocol monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # tyche metrics
  - job_name: 'tyche'
    static_configs:
      - targets: ['tyche:34000']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules
rule_files:
  - 'alerts.yml'